<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhingalala</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-animation"></div>
    
    <video class="cat-video" id="catVideo1" src="cat-scuba-dancing.webm" loop muted preload="auto"></video>
    <video class="cat-video" id="catVideo2" src="cat-scuba-dancing.webm" loop muted preload="auto"></video>
    
    <img class="lyric-img" id="lyricImg1" src="" alt="">
    <img class="lyric-img" id="lyricImg2" src="" alt="">
    
    <div class="music-notes" id="musicNotes">
        <span class="note" style="left: 10%; animation-delay: 0s;">♪</span>
        <span class="note" style="left: 30%; animation-delay: 2s;">♫</span>
        <span class="note" style="left: 50%; animation-delay: 4s;">♪</span>
        <span class="note" style="left: 70%; animation-delay: 1s;">♫</span>
        <span class="note" style="left: 90%; animation-delay: 3s;">♪</span>
    </div>

    <div class="container">
        <div class="intro-message" id="tapMsg">tap the play button :D</div>
        
        <div class="intro-message" id="msg1">mwehehehehe</div>
        <div class="intro-message" id="msg2">told ya, i'll make a website for you :3</div>
        
        <div class="intro-message" id="byeMsg">byeeeeeeee :D <3</div>
        
        <div class="play-view" id="playView">
            <button class="play-btn" id="playBtn" aria-label="Play">
                <svg viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </button>
        </div>

        <div class="lyrics-view" id="lyricsView">
            <div class="lyrics-container" id="lyricsContainer">
            </div>
        </div>
    </div>

    <audio id="audioPlayer" src="shohena-jatona.mp3" preload="auto"></audio>

    <script src="js/main.js"></script>
</body>
</html>
