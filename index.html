<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shohena Jatona - Lyrics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --accent: #e63946;
            --accent-glow: rgba(230, 57, 70, 0.4);
            --text-primary: #f8f8f8;
            --text-secondary: #8a8a8a;
            --text-muted: #4a4a4a;
            --gradient-1: linear-gradient(135deg, #e63946 0%, #ff6b6b 100%);
            --gradient-2: linear-gradient(180deg, transparent 0%, rgba(230, 57, 70, 0.1) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(230, 57, 70, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* Intro messages */
        .intro-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            opacity: 0;
            text-align: center;
            white-space: normal;
            word-wrap: break-word;
            max-width: 95%;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .intro-message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Initial state - Play button */
        .play-view {
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            position: absolute;
        }

        .play-view.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            position: relative;
        }

        .play-view.hidden {
            opacity: 0;
            transform: translateY(-30px);
            pointer-events: none;
            position: absolute;
        }

        .song-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .play-btn {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: var(--gradient-1);
            cursor: pointer;
            box-shadow: 
                0 0 60px var(--accent-glow),
                0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 
                0 0 80px var(--accent-glow),
                0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .play-btn:hover::before {
            transform: translateX(100%);
        }

        .play-btn svg {
            width: 40px;
            height: 40px;
            fill: white;
            transition: transform 0.3s;
        }

        .play-btn:hover svg {
            transform: scale(1.2);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Lyrics view */
        .lyrics-view {
            width: 100%;
            max-width: 600px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            position: absolute;
        }

        .lyrics-view.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            position: relative;
        }

        .lyrics-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .lyrics-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        /* Lyrics container */
        .lyrics-container {
            height: 400px;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding: 20px 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            mask-image: linear-gradient(
                to bottom,
                transparent 0%,
                black 15%,
                black 85%,
                transparent 100%
            );
            -webkit-mask-image: linear-gradient(
                to bottom,
                transparent 0%,
                black 15%,
                black 85%,
                transparent 100%
            );
        }

        .lyrics-container::-webkit-scrollbar {
            display: none;
        }

        .lyric-line {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 400;
            text-align: center;
            padding: 16px 20px;
            color: var(--text-secondary);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            line-height: 1.4;
            white-space: nowrap;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lyric-line:hover {
            color: var(--text-primary);
        }

        .lyric-line.active {
            color: var(--text-primary);
            font-size: 1.6rem;
            font-weight: 600;
            text-shadow: 0 0 30px var(--accent-glow);
            transform: scale(1.02);
        }

        .lyric-line.past {
            color: var(--text-muted);
        }

        .lyric-line.music-icon {
            color: var(--accent);
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .lyric-line.music-icon.active {
            color: var(--accent);
            opacity: 1;
            animation: pulseIcon 1s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Audio element hidden */
        audio {
            display: none;
        }

        /* Floating music notes */
        .music-notes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .music-notes.active {
            opacity: 1;
        }

        .note {
            position: absolute;
            font-size: 24px;
            color: var(--accent);
            animation: floatNote 8s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes floatNote {
            0% { 
                transform: translateY(100vh) rotate(0deg); 
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { 
                transform: translateY(-20vh) rotate(360deg); 
                opacity: 0;
            }
        }

        /* Responsive */
        /* Tablet */
        @media (max-width: 1024px) {
            .container {
                padding: 30px 15px;
            }
            
            .lyrics-view {
                max-width: 500px;
            }
            
            .lyrics-container {
                height: 350px;
            }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }
            
            .intro-message {
                font-size: 1.5rem;
            }
            
            .play-btn {
                width: 100px;
                height: 100px;
            }
            
            .play-btn svg {
                width: 32px;
                height: 32px;
            }
            
            .lyrics-view {
                max-width: 100%;
                padding: 0 10px;
            }
            
            .lyrics-container {
                height: 300px;
            }
            
            .lyric-line {
                font-size: 1.1rem;
                padding: 12px 15px;
            }
            
            .lyric-line.active {
                font-size: 1.4rem;
            }
            
            .lyrics-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="music-notes" id="musicNotes">
        <span class="note" style="left: 10%; animation-delay: 0s;">♪</span>
        <span class="note" style="left: 30%; animation-delay: 2s;">♫</span>
        <span class="note" style="left: 50%; animation-delay: 4s;">♪</span>
        <span class="note" style="left: 70%; animation-delay: 1s;">♫</span>
        <span class="note" style="left: 90%; animation-delay: 3s;">♪</span>
    </div>

    <div class="container">
        <div class="intro-message" id="tapMsg">tap the play button :D</div>
        
        <div class="intro-message" id="msg1">mwehehehehe</div>
        <div class="intro-message" id="msg2">told ya, i'll make a website for you :3</div>
        
        <div class="play-view" id="playView">
            <button class="play-btn" id="playBtn" aria-label="Play">
                <svg viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </button>
        </div>

        <div class="lyrics-view" id="lyricsView">
            <div class="lyrics-header">
                <h2 class="lyrics-title">Lyrics</h2>
            </div>
            
            <div class="lyrics-container" id="lyricsContainer">
                </div>
        </div>
    </div>

    <audio id="audioPlayer" src="shohena-jatona.mp3"></audio>

<script>
        const tapMsg = document.getElementById('tapMsg');
        const msg1 = document.getElementById('msg1');
        const msg2 = document.getElementById('msg2');
        const playView = document.getElementById('playView');
        const lyricsView = document.getElementById('lyricsView');
        const musicNotes = document.getElementById('musicNotes');
        const playBtn = document.getElementById('playBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        const lyricsContainer = document.getElementById('lyricsContainer');

        function showTapMessage() {
            tapMsg.classList.add('show');
            setTimeout(() => {
                playView.classList.add('visible');
            }, 1500);
        }

        showTapMessage();

        let lyricsOpened = false;

        const lyricsData = [
            { start: 17.5, end: 20.5, text: "Tumi ki janonaaa" },
            { start: 21, end: 22.5, text: "Tumi ki bojhonaaa" },
            { start: 22.7, end: 27.8, text: "tomar e bihone e mooooon joleee" },
            { start: 28, end: 29.3, text: "Tumi ki janonaaa" },
            { start: 30.2, end: 32.4, text: "Tumi ki bojhonaaa" },
            { start: 32.8, end: 37, text: "tomar e Kotha e hridoyyy boleee" },
            { start: 38, end: 42, text: "Jodi, basho, bhalo amakeee" },
            { start: 42.5, end: 47.7, text: "tobe, keno, thaako dure dureee" },
            { start: 48, end: 52.7, text: "shohenaa, jaatonaa, ki korii, bolo naaa" },
            { start: 53, end: 57.2, text: "jotonee, rekhechhii, tomaake koto naa" },
            { start: 57.2, end: 62.2, text: "shohenaa, jaatonaa, ki korii, bolo naaa" },
            { start: 62.7, end: 67, text: "jotonee, rekhechii, tomaake koto naa" },
            { start: 67, end: 91, text: "♪ ♫ ♪" },
            { start: 91, end: 93.3, text: "e moner e shimanaay" },
            { start: 93.9, end: 95.5, text: "Tumi chhara Kew naai" },
            { start: 96, end: 100, text: "araal hole jeno, more jaaaaaai" },
            { start: 101, end: 102.9, text: "e moner e shimanaay" },
            { start: 103.2, end: 105.4, text: "tumii chhara keww naaiii" },
            { start: 105.7, end: 109.7, text: "araal hooooole jenooo, moreee jaaaaai" },
            { start: 110.1, end: 115.2, text: "shohenaa, jaatonaa, ki koriii bolonaaa" },
            { start: 115.7, end: 119.5, text: "jotonee, rekhechhii, tomaake koto naa" },
            { start: 120, end: 124.5, text: "shohenaa, jaatonaa, ki koriii bolonaaa" },
            { start: 125, end: 129.5, text: "jotonee, rekhechhii, tomaake koto naa" }
        ];

        let isPlaying = false;
        let currentLineIndex = -1;

        // Render lyrics
        lyricsData.forEach((line, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.textContent = line.text;
            div.dataset.index = index;
            div.addEventListener('click', () => {
                audioPlayer.currentTime = line.start;
            });
            lyricsContainer.appendChild(div);
        });

        const lyricLines = document.querySelectorAll('.lyric-line');

        // Add music-icon class to placeholder lines
        lyricLines.forEach((line, index) => {
            if (lyricsData[index].text.includes('♪')) {
                line.classList.add('music-icon');
            }
        });

        // Play button click
        playBtn.addEventListener('click', () => {
            playView.classList.add('hidden');
            audioPlayer.volume = 0;
            audioPlayer.play();
            isPlaying = true;
            playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>';

            // Fade in music from 0% to 100% over 2 seconds
            let startTime = null;
            const fadeDuration = 2000;
            function fadeIn(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / fadeDuration, 1);
                audioPlayer.volume = progress;
                if (progress < 1) {
                    requestAnimationFrame(fadeIn);
                }
            }
            requestAnimationFrame(fadeIn);

            // After play clicked, show mwehehe and told ya messages
            // Based on music timeline:
            // 0:02 - 0:06: mwehehe (fade in 0.5s, stay 3s, fade out 0.5s)
            // 0:06 - 0:08: blank/delay
            // 0:08 - 0:15.5: told ya (fade in 0.5s, stay 6.5s, fade out 0.5s)
            setTimeout(() => {
                tapMsg.classList.remove('show');
            }, 100);

            // mwehehe: 0:02 fade in, 0:05.5 fade out starts (ends at 0:06)
            setTimeout(() => {
                msg1.classList.add('show');
            }, 2000);

            setTimeout(() => {
                msg1.classList.remove('show');
            }, 5500);

            // told ya: 0:08 fade in, 0:15 fade out starts (ends at 0:15.5)
            setTimeout(() => {
                msg2.classList.add('show');
            }, 8000);

            setTimeout(() => {
                msg2.classList.remove('show');
            }, 15000);

            // Open lyrics at ~16s (before first lyric at 17.5s)
            setTimeout(() => {
                if (!lyricsOpened) {
                    lyricsOpened = true;
                    lyricsView.classList.add('active');
                    musicNotes.classList.add('active');
                }
            }, 16000);
        });

        // Time update
        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;

            // Update active lyric
            lyricsData.forEach((line, index) => {
                if (currentTime >= line.start && currentTime < line.end) {
                    if (currentLineIndex !== index) {
                        // Remove active from previous
                        if (currentLineIndex !== -1) {
                            lyricLines[currentLineIndex].classList.remove('active');
                            lyricLines[currentLineIndex].classList.add('past');
                        }
                        
                        // Add active to current
                        lyricLines[index].classList.add('active');
                        lyricLines[index].classList.remove('past');
                        
                        // Auto scroll to active lyric
                        lyricLines[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        currentLineIndex = index;
                    }
                }
            });
        });

        // Audio ended
        audioPlayer.addEventListener('ended', () => {
            playView.classList.remove('hidden');
            lyricsView.classList.remove('active');
            musicNotes.classList.remove('active');
            isPlaying = false;
            playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
            currentLineIndex = -1;
            lyricLines.forEach(line => {
                line.classList.remove('active', 'past');
            });
        });
    </script>
</body>
</html>
